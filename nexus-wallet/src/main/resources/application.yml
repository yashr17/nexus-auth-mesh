server:
  port: 8082

spring:
  application:
    name: nexus-wallet
  datasource:
    url: jdbc:h2:mem:walletdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true # Crucial for verifying our transactional locks later